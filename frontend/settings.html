<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Minerva</title>
    <link href="/static/css/style.css" rel="stylesheet" />
  </head>

  <body class="app-page">
    <main class="container settings-shell">
      <header>
        <div>
          <p class="eyebrow">Minerva</p>
          <h1>Settings</h1>
        </div>
        <div class="header-actions">
          <nav class="dashboard-nav" aria-label="Main navigation">
            <a href="/home">Home</a>
            <a href="/store">Store</a>
            <a href="/farm">Farm</a>
            <a href="/settings" aria-current="page">Settings</a>
          </nav>
          <div class="nav-progress" aria-label="Progress summary">
            <div class="nav-progress-item">
              <span class="nav-progress-icon" aria-hidden="true">🔥</span>
              <span class="nav-progress-label">Streak</span>
              <span id="current-streak" class="nav-progress-value">0</span>
            </div>
            <div class="nav-progress-item coins-progress">
              <span class="nav-progress-icon" aria-hidden="true">🪙</span>
              <span class="nav-progress-label">Coins</span>
              <span id="current-coins" class="nav-progress-value">0</span>
            </div>
          </div>

          <button id="logoutBtn" class="btn secondary" type="button">Log Out</button>
        </div>
      </header>

      <section class="settings-grid" aria-label="Settings sections">
        <section class="settings-section" aria-labelledby="account-title">
          <h2 id="account-title">Account</h2>
          <form class="settings-form">
            <label for="settings-username">Username</label>
            <input id="settings-username" type="text" placeholder="username" />

            <label for="settings-email">Email</label>
            <input id="settings-email" type="email" placeholder="email" />

            <label for="settings-password">Password</label>
            <input id="settings-password" type="password" placeholder="password" />

            <label for="settings-phone">Phone Number (Optional)</label>
            <input id="settings-phone" type="tel" placeholder="phone number" />
          </form>
        </section>

        <section class="settings-section" aria-labelledby="canvas-title">
          <h2 id="canvas-title">Canvas Integration</h2>
          <form class="settings-form">
            <label for="canvasUrl">Canvas Base URL</label>
            <input
              type="url"
              id="canvasUrl"
              placeholder="e.g. https://yourinstitution.instructure.com"
              autocomplete="off"
            />

            <label for="canvasToken">Canvas API Token</label>
            <input
              type="password"
              id="canvasToken"
              placeholder="Enter your Canvas API token"
              autocomplete="off"
            />
          </form>
        </section>

        <section class="settings-section full-span" aria-labelledby="preferences-title">
          <h2 id="preferences-title">Preferences</h2>
          <div class="settings-toggle-row">
            <input class="theme-toggle-checkbox" type="checkbox" id="darkToggle" />
            <label for="darkToggle">Use dark mode across Minerva</label>
          </div>
        </section>
      </section>

      <div class="settings-actions">
        <a href="/home" class="btn secondary">Back</a>
        <button id="saveBtn" class="btn" type="button">Save Changes</button>
      </div>

      <footer class="footer">
        <p>
          © 2026 Maxwell Whitmarsh, Brendon Wong, Nathen dela Torre, Jonathan Lee.
        </p>
      </footer>
    </main>
    <script src="/static/jss/logout.js"></script>
    <script src="/static/jss/home.js"></script>
    <script src="/static/jss/dark-mode.js"></script>
    <script src="/static/jss/settings.js"></script>
  </body>
</html>
