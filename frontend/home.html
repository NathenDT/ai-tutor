<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Minerva</title>
    <link href="/static/css/style.css" rel="stylesheet" />
  </head>

  <body class="app-page">
    <main class="container dashboard-shell">
      <header>
        <div>
          <p class="eyebrow">Minerva</p>
          <h1>Dashboard</h1>
        </div>
        <div class="header-actions">
          <nav class="dashboard-nav" aria-label="Main navigation">
            <a href="/home" aria-current="page">Home</a>
            <a href="/store">Store</a>
            <a href="/farm">Farm</a>
            <a href="/settings">Settings</a>
          </nav>
          <div class="nav-progress" aria-label="Progress summary">
            <div class="nav-progress-item">
              <span class="nav-progress-icon" aria-hidden="true">🔥</span>
              <span class="nav-progress-label">Streak</span>
              <span id="current-streak" class="nav-progress-value">0</span>
            </div>
            <div class="nav-progress-item coins-progress">
              <span class="nav-progress-icon" aria-hidden="true">🪙</span>
              <span class="nav-progress-label">Coins</span>
              <span id="current-coins" class="nav-progress-value">0</span>
            </div>
          </div>
        </div>
      </header>

      <section class="courses-section" aria-labelledby="canvas-courses-title">
        <div class="courses-heading">
          <div>
            <p class="eyebrow">Canvas</p>
            <h2 id="canvas-courses-title">Courses</h2>
          </div>
        </div>
        <p id="canvas-courses-status" class="courses-status">Loading Canvas courses...</p>
        <div id="canvas-courses-list" class="courses-list" aria-live="polite"></div>
      </section>

      <section class="custom-section">
        <div class="custom-card">
          <a href="/upload-content" class="link-btn">Custom</a>
        </div>
      </section>

      <footer class="footer">
        <p>
          © 2026 Maxwell Whitmarsh, Brendon Wong, Nathen dela Torre, Jonathan Lee.
        </p>
      </footer>
    </main>

    <script src="/static/jss/home.js"></script>
    <script src="/static/jss/dark-mode.js"></script>
  </body>
</html>
