<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Store Page</title>
        <link href="/static/style.css" rel="stylesheet" />
        <head>
    <body>
        <h1>Items In Store</h1>
        <div class="item-list">
            {% for item in items %}
                <div class="item">
                    <h2>{{ item.name }}</h2>
                    <p>{{ item.description }}</p>
                    <p>Price: ${{ item.price }}</p>
                </div>
            {% endfor %}
        </div>
    </body>
</html>
